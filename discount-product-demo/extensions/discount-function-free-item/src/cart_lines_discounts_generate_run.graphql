query CartInput {
  cart {
    lines {
      id
      cost {
        subtotalAmount {
          amount
        }
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        ... on ProductVariant {
          product {
            hasAnyTag(tags: ["Free Item"])
          }
        }
      }
    }
  }
  discount {
    discountClasses
  }
}
